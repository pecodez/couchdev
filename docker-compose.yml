services:
  hub:
    build:
      context: .
      dockerfile: hub/Dockerfile
    ports:
      - "8080:8080"
    volumes:
      - ./test/data:/mnt/couchdev
    environment:
      - TOKEN=couchdev-test-token
      - LISTEN_ADDR=:8080
      - DB_PATH=/mnt/couchdev/hub.db

  webdev:
    build:
      context: .
      dockerfile: mcp/webdev/Dockerfile
    volumes:
      - ./test/data:/mnt/couchdev
    environment:
      - DATA_ROOT=/mnt/couchdev
